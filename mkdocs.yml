site_name: MEDHIRA Concurrency Utils
site_url: https://medhira-concurrency-utils.readthedocs.io
site_description: Hardware Concurrency Optimizer - Engineering Intelligence Across Everything
site_author: MEDHIRA Team

repo_url: https://github.com/HELLOMEDHIRA/medhira-concurrency-utils
repo_name: HELLOMEDHIRA/medhira-concurrency-utils

copyright: "Copyright &copy; 2024 MEDHIRA - Engineering Intelligence Across Everything"

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  logo: https://raw.githubusercontent.com/HELLOMEDHIRA/medhira/main/assets/medhira-logo.png
  favicon: https://raw.githubusercontent.com/HELLOMEDHIRA/medhira/main/assets/medhira-logo.png
  features:
    - navigation.top
    - navigation.tracking
    - navigation.tabs
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - API Reference:
      - getDynamicConcurrency: api/getdynamicconcurrency.md
  - Use Cases:
      - Parallel Processing: use-cases/parallel-processing.md
      - Worker Threads: use-cases/worker-threads.md
      - Batch Processing: use-cases/batch-processing.md
  - About:
      - License: about/license.md
      - Contributing: about/contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HELLOMEDHIRA
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/medhira
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/medhira
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/medhira-concurrency-utils
  version: 0.0.1
  release: 0.0.1